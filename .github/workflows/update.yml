name: Update Game Data
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Update Genshin banner data
        run: node scripts/update-genshin.js
      - name: Update HSR banner data
        run: node scripts/update-hsr.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update game data $(date -u +%Y-%m-%d)"
          git push
