name: Backfill Images
on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Game to backfill (hsr, genshin, zzz)'
        required: true
        default: 'hsr'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Run image backfill
        run: node scripts/backfill-images.js --game=${{ github.event.inputs.game }}
      - name: Commit and push new images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "backfill: ${{ github.event.inputs.game }} images $(date -u +%Y-%m-%d)"
          git push